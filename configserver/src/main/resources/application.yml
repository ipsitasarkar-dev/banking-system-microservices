spring:
  application:
    name: "configserver"
  profiles:
    #active: native
    active: git

  cloud:
    config:
      server:
        git:
          uri: "https://github.com/Ipsita0301/EazyBank-config.git"
          default-label: main
          timeout: 5
          clone-on-start: true
          force-pull: true

  rabbitmq:
    host: "localhost"
    port: 5671
    password: "guest"

management:
  endpoints:
    web:
      exposure:
        include: "*"
    health:
      readiness-state:
        enabled: true
      liveness-state:
        enabled: true
      endpoint:
        health:
          probes:
            enabled: true

encrypt:
  Key: "45D81EC1EF61DF9AD"


server:
  port: 8071
